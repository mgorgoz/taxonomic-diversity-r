reference:
  - title: "Quick Start"
    icon: fa-rocket
    desc: >
      Start here. These two functions handle multi-site batch processing and
      multi-community comparison — the fastest way to get results from your data.
    contents:
      - batch_analysis
      - compare_indices

  - title: "Classical Diversity Indices"
    icon: fa-calculator
    desc: >
      Shannon-Wiener (H') and Gini-Simpson indices — the most widely used
      diversity measures in ecology. Shannon includes three bias correction
      methods: Miller-Madow, Grassberger, and Chao-Shen.
    contents:
      - shannon
      - simpson

  - title: "Clarke & Warwick Taxonomic Distinctness"
    icon: fa-sitemap
    desc: >
      Path-length-based taxonomic distinctness measures.
      Delta and Delta* are abundance-weighted; AvTD and VarTD are
      presence/absence-based and sample-size independent.
    contents:
      - delta
      - delta_star
      - avtd
      - vartd

  - title: "Ozkan pTO — Core Functions"
    icon: fa-leaf
    desc: >
      Deng entropy-based taxonomic diversity following Ozkan (2018).
      Produces 8 complementary indices (uTO, TO, uTO+, TO+ and their
      max-informative-level variants).
    contents:
      - ozkan_pto
      - pto_components
      - deng_entropy_level

  - title: "Ozkan pTO — Full Pipeline"
    icon: fa-cogs
    desc: >
      The complete three-run pipeline: deterministic calculation (Run 1),
      stochastic resampling with slicing (Run 2), max-informative levels (Run 3),
      plus jackknife and sensitivity analysis.
    contents:
      - ozkan_pto_full
      - ozkan_pto_resample
      - ozkan_pto_sensitivity
      - ozkan_pto_jackknife

  - title: "Simulation & Significance Testing"
    icon: fa-chart-area
    desc: >
      Random subsampling from a master species pool to generate expected
      distributions of AvTD and VarTD. Use with plot_funnel() for 95%
      confidence funnels and statistical significance testing.
    contents:
      - simulate_td
      - rarefaction_taxonomic

  - title: "Visualization"
    icon: fa-chart-bar
    desc: >
      Seven ggplot2-based plot types covering significance testing,
      rarefaction, resampling trajectories, community comparison,
      similarity patterns, composition, and taxonomic structure.
    contents:
      - plot_funnel
      - plot_rarefaction
      - plot_iteration
      - plot_radar
      - plot_heatmap
      - plot_bubble
      - plot_taxonomic_tree

  - title: "Taxonomic Tree & Distance"
    icon: fa-tree
    desc: >
      Build taxonomic classification trees from species-level data and
      compute pairwise taxonomic distance matrices used by Clarke & Warwick
      and Ozkan pTO methods.
    contents:
      - build_tax_tree
      - tax_distance_matrix

  - title: "Example Datasets"
    icon: fa-database
    desc: >
      Ready-to-use ecological community datasets from Mediterranean forest
      ecosystems in Anatolia, Turkey. Includes abundance data and full
      taxonomic classifications.
    contents:
      - anatolian_trees
      - gazi_comm
      - gazi_gytk

